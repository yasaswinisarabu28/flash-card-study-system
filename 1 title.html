<html>
<head>
<title>Flash Card Study App</title>
<style>
  
body {
      margin: 0;
      height: 100vh;
      background-image: url("first full background image.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
.my-btn {
  position: absolute;
  top: 90%;              /* 3/4th height */
  left: 50%;             /* center width */
  transform: translate(-50%, -50%);
  padding: 12px 25px;
  font-size: 38px;
  background-color:lightgreen;
  color: white;
  border:2px solid gold;
  border-radius: 58px;
  cursor: pointer;
  box-shadow: 0 10px 25px rgba(128, 0, 128, 0.5);
}
.my-btn:hover {
  background-color: #90ee90; /* slightly darker green */
  color: white;
  transform: translate(-50%, -55%) scale(1.05); /* lift + zoom */
  box-shadow: 0 15px 35px rgba(128, 0, 128, 0.7);
}
</style>

</head>
<body>
<div class="container">
  <a href="2 login.html">
  <button class="my-btn">🎯 Start Learning Journey</button>
  </a>
</div>

  

</body>
</html>
